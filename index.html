<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Genesis — Referência de Email</title>
  <meta http-equiv="Content-Security-Policy" content="default-src 'none'; style-src 'unsafe-inline'; script-src 'unsafe-inline';">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
      background: #f0f2f5;
      color: #333;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 16px;
    }
    .card {
      background: #fff;
      border-radius: 12px;
      max-width: 520px;
      width: 100%;
      overflow: hidden;
      box-shadow: 0 4px 24px rgba(0,0,0,0.10), 0 1px 4px rgba(0,0,0,0.06);
    }
    .header {
      background: linear-gradient(135deg, #1a365d 0%, #2d5aa0 100%);
      color: #fff;
      padding: 20px 24px;
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .header-icon {
      width: 36px;
      height: 36px;
      background: rgba(255,255,255,0.15);
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      flex-shrink: 0;
    }
    .header-text {
      font-size: 17px;
      font-weight: 600;
      letter-spacing: 0.3px;
    }
    .header-sub {
      font-size: 12px;
      font-weight: 400;
      opacity: 0.8;
      margin-top: 2px;
    }

    /* Main content */
    .body { padding: 28px 24px; }

    /* Subject display */
    .subject-label {
      font-size: 12px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      color: #888;
      margin-bottom: 8px;
    }
    .subject-box {
      background: #f8f9fb;
      border: 2px solid #e2e6ed;
      border-radius: 8px;
      padding: 16px 18px;
      font-size: 16px;
      font-weight: 500;
      color: #1a365d;
      word-break: break-word;
      line-height: 1.45;
      margin-bottom: 20px;
      position: relative;
      cursor: pointer;
      transition: border-color 0.2s, background 0.2s;
      user-select: all;
      -webkit-user-select: all;
    }
    .subject-box:hover { border-color: #2d5aa0; background: #f0f4fa; }
    .subject-box.copied-flash {
      border-color: #27ae60;
      background: #f0faf4;
    }

    /* Copy button */
    .copy-btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: #2d5aa0;
      color: #fff;
      border: none;
      padding: 12px 24px;
      border-radius: 8px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s, transform 0.1s;
      width: 100%;
      justify-content: center;
    }
    .copy-btn:hover { background: #1a365d; }
    .copy-btn:active { transform: scale(0.98); }
    .copy-btn.copied {
      background: #27ae60;
    }
    .copy-btn svg { width: 18px; height: 18px; flex-shrink: 0; }

    /* Instructions */
    .instructions {
      margin-top: 20px;
      padding: 16px 18px;
      background: #f8f9fb;
      border-radius: 8px;
      border-left: 3px solid #2d5aa0;
    }
    .instructions-title {
      font-size: 13px;
      font-weight: 600;
      color: #1a365d;
      margin-bottom: 10px;
    }
    .instructions ol {
      list-style: none;
      counter-reset: steps;
      padding: 0;
    }
    .instructions li {
      counter-increment: steps;
      font-size: 14px;
      color: #555;
      padding: 4px 0 4px 32px;
      position: relative;
      line-height: 1.4;
    }
    .instructions li::before {
      content: counter(steps);
      position: absolute;
      left: 0;
      width: 22px;
      height: 22px;
      background: #2d5aa0;
      color: #fff;
      border-radius: 50%;
      font-size: 12px;
      font-weight: 700;
      display: flex;
      align-items: center;
      justify-content: center;
      top: 4px;
    }

    /* Secondary link */
    .secondary-link {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      margin-top: 16px;
      color: #2d5aa0;
      text-decoration: none;
      font-size: 14px;
      font-weight: 500;
      padding: 8px 0;
      transition: color 0.2s;
    }
    .secondary-link:hover { color: #1a365d; text-decoration: underline; }
    .secondary-link svg { width: 16px; height: 16px; }

    /* Redirect spinner (desktop) */
    .redirect-section {
      text-align: center;
      padding-bottom: 8px;
    }
    .spinner {
      display: inline-block;
      width: 28px;
      height: 28px;
      border: 3px solid #e0e0e0;
      border-top-color: #2d5aa0;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin-bottom: 12px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .redirect-text {
      font-size: 14px;
      color: #888;
    }

    /* Divider */
    .divider {
      height: 1px;
      background: #e8eaed;
      margin: 20px 0;
    }

    /* Error */
    .error-msg {
      color: #c0392b;
      font-size: 15px;
      text-align: center;
      padding: 32px 24px;
    }

    /* Footer */
    .footer {
      background: #f8f9fb;
      border-top: 1px solid #e8eaed;
      padding: 12px 24px;
      text-align: center;
      font-size: 11px;
      color: #aaa;
      letter-spacing: 0.3px;
    }

    /* Hide sections by default */
    .hidden { display: none !important; }
  </style>
</head>
<body>
  <div class="card">
    <div class="header">
      <div class="header-icon">G</div>
      <div>
        <div class="header-text">Genesis Lda — Gestão de Tarefas</div>
        <div class="header-sub">Referência de Email</div>
      </div>
    </div>

    <!-- Error state -->
    <div id="error" class="error-msg hidden">
      Nenhum termo de pesquisa fornecido. Verifique o formato do link.
    </div>

    <!-- Main content (hidden until JS populates) -->
    <div id="main" class="body hidden">

      <!-- Subject always visible -->
      <div class="subject-label">Assunto do Email</div>
      <div class="subject-box" id="subject-box" title="Copiar para a área de transferência" onclick="copyQuery()"></div>

      <!-- Mobile: copy + instructions (no auto-redirect) -->
      <div id="mobile-section" class="hidden">
        <button class="copy-btn" id="copy-btn" onclick="copyQuery()">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/></svg>
          <span id="copy-btn-text">Copiar para a área de transferência</span>
        </button>

        <div class="instructions" id="instructions">
          <div class="instructions-title" id="instructions-title">Como encontrar este email:</div>
          <ol id="instructions-list">
            <!-- Populated by JS -->
          </ol>
        </div>

        <a id="try-open-link" class="secondary-link" href="#" target="_blank">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 13v6a2 2 0 01-2 2H5a2 2 0 01-2-2V8a2 2 0 012-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>
          <span id="try-open-text">Tentar abrir no navegador</span>
        </a>
      </div>

      <!-- Desktop: redirect spinner, then fallback -->
      <div id="desktop-section" class="hidden">
        <div class="redirect-section" id="redirect-spinner">
          <div class="spinner"></div>
          <div class="redirect-text">A redirecionar...</div>
        </div>

        <!-- Fallback shown after timeout -->
        <div id="desktop-fallback" class="hidden">
          <button class="copy-btn" id="desktop-copy-btn" onclick="copyQuery()">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/></svg>
            <span id="desktop-copy-text">Copiar assunto para pesquisa manual</span>
          </button>

          <div style="text-align:center;">
            <a id="desktop-open-link" class="secondary-link" href="#" target="_blank">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 13v6a2 2 0 01-2 2H5a2 2 0 01-2-2V8a2 2 0 012-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>
              <span id="desktop-open-text">Abrir pesquisa de email</span>
            </a>
          </div>
        </div>
      </div>

    </div>

    <div class="footer">Genesis Lda &mdash; Gestão de Tarefas</div>
  </div>

  <script>
    (function () {
      var params = new URLSearchParams(window.location.search);
      var to = (params.get('to') || '').toLowerCase();
      var q = params.get('q') || '';

      var errorEl = document.getElementById('error');
      var mainEl = document.getElementById('main');

      // Validate query
      if (!q) {
        errorEl.classList.remove('hidden');
        return;
      }

      // Show main content
      mainEl.classList.remove('hidden');

      // Populate subject
      document.getElementById('subject-box').textContent = q;

      // Detect mobile
      var isMobile = (function () {
        // Check touch capability
        if ('ontouchstart' in window || navigator.maxTouchPoints > 0) {
          // Also check screen width to avoid false positives on touch-enabled laptops
          if (window.innerWidth <= 768) return true;
        }
        // Check user agent as secondary signal
        if (/Android|iPhone|iPad|iPod|webOS|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent)) {
          return true;
        }
        return false;
      })();

      // Build URLs based on provider
      var searchUrl, openLabel, appName, appIcon;
      if (to === 'outlook') {
        searchUrl = 'https://outlook.office.com/mail/deeplink/search?query=' + encodeURIComponent('subject:"' + q + '"');
        openLabel = 'Try opening Outlook';
        appName = 'Outlook';
      } else {
        // Default to Gmail
        searchUrl = 'https://mail.google.com/mail/#search/' + encodeURIComponent('subject:(' + q + ')');
        openLabel = 'Try opening Gmail';
        appName = 'Gmail';
      }

      // Store for copy function
      window._redirectQuery = q;
      window._appName = appName;

      if (isMobile) {
        // --- MOBILE PATH ---
        document.getElementById('mobile-section').classList.remove('hidden');

        // Set instructions — user must tap copy button first
        var listEl = document.getElementById('instructions-list');
        var searchTarget = to === 'outlook' ? 'Ctrl+E' : 'a barra de pesquisa';
        listEl.innerHTML =
          '<li>Toque no botão acima para copiar</li>' +
          '<li>Abra o aplicativo <strong>' + appName + '</strong></li>' +
          '<li>Toque na barra de pesquisa e <strong>cole</strong> (pressione longamente → Colar)</li>';

        // Secondary "try opening" link
        var tryLink = document.getElementById('try-open-link');
        tryLink.href = searchUrl;
        document.getElementById('try-open-text').textContent = 'Tentar abrir ' + appName + ' no navegador';

      } else {
        // --- DESKTOP PATH ---
        document.getElementById('desktop-section').classList.remove('hidden');

        // Set up desktop links
        var desktopLink = document.getElementById('desktop-open-link');
        desktopLink.href = searchUrl;
        var shortcutKey = to === 'outlook' ? 'Ctrl+E' : 'Ctrl+/';
        document.getElementById('desktop-open-text').textContent = 'Abrir ' + appName + ' (' + shortcutKey + ' para pesquisar)';

        // Show fallback copy section after brief delay (no auto-redirect)
        setTimeout(function () {
          document.getElementById('redirect-spinner').classList.add('hidden');
          document.getElementById('desktop-fallback').classList.remove('hidden');
        }, 500);
      }
    })();

    function copyQuery() {
      var q = window._redirectQuery || '';
      if (!q) return;

      var allCopyBtns = [
        { btn: document.getElementById('copy-btn'), text: document.getElementById('copy-btn-text') },
        { btn: document.getElementById('desktop-copy-btn'), text: document.getElementById('desktop-copy-text') }
      ];
      var subjectBox = document.getElementById('subject-box');

      function showSuccess() {
        subjectBox.classList.add('copied-flash');
        allCopyBtns.forEach(function (item) {
          if (item.btn) {
            item.btn.classList.add('copied');
            if (item.text) item.text.textContent = 'Copiado!';
          }
        });
        // Update mobile instructions after successful copy
        var instructionsTitle = document.getElementById('instructions-title');
        if (instructionsTitle) instructionsTitle.textContent = 'Assunto copiado! Agora:';
        setTimeout(function () {
          subjectBox.classList.remove('copied-flash');
          allCopyBtns.forEach(function (item) {
            if (item.btn) {
              item.btn.classList.remove('copied');
              if (item.text) {
                item.text.textContent = item.btn.id === 'copy-btn'
                  ? 'Copiar para a área de transferência'
                  : 'Copiar assunto para pesquisa manual';
              }
            }
          });
          if (instructionsTitle) instructionsTitle.textContent = 'Como encontrar este email:';
        }, 2000);
      }

      function showCopyFailed() {
        allCopyBtns.forEach(function (item) {
          if (item.text) item.text.textContent = 'Selecione o texto acima e copie manualmente (pressione longamente)';
        });
      }

      if (navigator.clipboard && navigator.clipboard.writeText) {
        navigator.clipboard.writeText(q).then(showSuccess).catch(function () {
          fallbackCopy(q, showSuccess, showCopyFailed);
        });
      } else {
        fallbackCopy(q, showSuccess, showCopyFailed);
      }
    }

    function fallbackCopy(text, onSuccess, onFailure) {
      var ta = document.createElement('textarea');
      ta.value = text;
      ta.style.position = 'fixed';
      ta.style.left = '-9999px';
      ta.style.top = '-9999px';
      document.body.appendChild(ta);
      ta.focus();
      ta.select();
      var success = false;
      try {
        success = document.execCommand('copy');
      } catch (e) {
        success = false;
      }
      document.body.removeChild(ta);
      if (success && onSuccess) {
        onSuccess();
      } else if (!success && onFailure) {
        onFailure();
      }
    }
  </script>
</body>
</html>
